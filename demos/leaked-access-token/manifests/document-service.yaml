# Document Service + OPA Service deployment
#
# Deployed in the ctf-demo namespace. The document service validates JWTs
# from Keycloak and queries OPA for authorization decisions.
# OPA policies are mounted from the opa-policies ConfigMap.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: ctf-demo
data:
  user_permissions.rego: |
    package demo.users

    import rego.v1

    # Fallback user-department mappings (JWT groups are primary)
    user_departments_fallback := {
        "alex": ["engineering", "hr"],
    }

    has_department(user_name, department) if {
        department_list := get_departments(user_name)
        department in department_list
    }

    # Rule 1: Use JWT claims from direct access request
    get_departments(_) := departments if {
        not input.delegation
        departments := input.user_departments
        count(departments) > 0
    }

    # Rule 2: Use JWT claims from delegation context
    get_departments(_) := departments if {
        input.delegation
        departments := input.delegation.user_departments
        count(departments) > 0
    }

    # Rule 3: Use top-level user_departments even with delegation (fallback)
    get_departments(_) := departments if {
        input.delegation
        not input.delegation.user_departments
        departments := input.user_departments
        count(departments) > 0
    }

    # Rule 4: Fallback to hardcoded mappings
    get_departments(user_name) := departments if {
        not jwt_claims_provided
        departments := user_departments_fallback[user_name]
    }

    # Rule 5: Default for unknown users
    get_departments(user_name) := [] if {
        not jwt_claims_provided
        not user_departments_fallback[user_name]
    }

    jwt_claims_provided if {
        input.user_departments
        count(input.user_departments) > 0
    }

    jwt_claims_provided if {
        input.delegation.user_departments
        count(input.delegation.user_departments) > 0
    }

  agent_permissions.rego: |
    package demo.agents

    import rego.v1

    # Agent capability mappings
    # Claude is restricted to engineering only — no HR access
    agent_capabilities := {
        "claude-agent": ["engineering"],
    }

    has_capability(agent_name, department) if {
        capability_list := agent_capabilities[agent_name]
        department in capability_list
    }

    get_capabilities(agent_name) := capabilities if {
        capabilities := agent_capabilities[agent_name]
    }

    get_capabilities(agent_name) := [] if {
        not agent_capabilities[agent_name]
    }

  delegation.rego: |
    package demo.authorization

    import rego.v1

    import data.demo.agents
    import data.demo.users

    parse_spiffe_id(spiffe_id) := result if {
        parts := split(spiffe_id, "/")
        count(parts) >= 2
        result := {"type": parts[count(parts) - 2], "name": parts[count(parts) - 1]}
    }

    get_required_departments := deps if {
        deps := input.document_metadata.required_departments
    } else := [dep] if {
        dep := input.document_metadata.required_department
        dep != ""
    } else := []

    is_public_document if {
        required := get_required_departments
        count(required) == 0
    }

    has_any_required_department(permissions) if {
        is_public_document
    }

    has_any_required_department(permissions) if {
        required := get_required_departments
        some dept in required
        dept in permissions
    }

    default allow := false

    # Rule 1: Public documents are always accessible
    allow if {
        is_public_document
    }

    # Rule 2: Direct user access via SPIFFE ID (no agent delegation)
    allow if {
        not input.delegation
        caller := parse_spiffe_id(input.caller_spiffe_id)
        caller.type == "user"
        user_depts := users.get_departments(caller.name)
        has_any_required_department(user_depts)
    }

    # Rule 2b: Direct JWT access (non-SPIFFE caller with groups from token)
    # When a user's JWT is presented directly (e.g. via port-forward),
    # the caller_spiffe_id is the azp claim (not a SPIFFE URI).
    # Use the user_departments from JWT groups for authorization.
    allow if {
        not input.delegation
        not parse_spiffe_id(input.caller_spiffe_id)
        input.user_departments
        count(input.user_departments) > 0
        has_any_required_department(input.user_departments)
    }

    # Rule 2c: Agent calling with user's groups (AuthBridge token exchange)
    # After token exchange, the token has azp=agent SPIFFE ID and groups
    # from the original user. The document-service sets caller_spiffe_id
    # to azp (the agent) and user_departments from JWT groups.
    # Compute the permission intersection: user_departments ∩ agent_capabilities
    allow if {
        not input.delegation
        caller := parse_spiffe_id(input.caller_spiffe_id)
        caller.type == "sa"
        input.user_departments
        count(input.user_departments) > 0
        agent_caps := agents.get_capabilities(caller.name)
        effective := {d | some d in input.user_departments; d in agent_caps}
        has_any_required_department(effective)
    }

    # Rule 3: Delegated access (user delegates to agent)
    # Effective permissions = user departments ∩ agent capabilities
    allow if {
        input.delegation
        user := parse_spiffe_id(input.delegation.user_spiffe_id)
        agent := parse_spiffe_id(input.delegation.agent_spiffe_id)
        user.type == "user"
        agent.type == "agent"
        user_depts := users.get_departments(user.name)
        agent_caps := agents.get_capabilities(agent.name)
        effective := {d | some d in user_depts; d in agent_caps}
        has_any_required_department(effective)
    }

    # Rule 3b: Delegated JWT access (azp is agent SPIFFE ID, sub is user UUID)
    # After AuthBridge token exchange, the token has:
    #   sub = user UUID, azp = agent's SPIFFE ID or client ID
    # The delegation context carries user_departments from the original token.
    allow if {
        input.delegation
        agent_id := input.delegation.agent_spiffe_id
        agent := parse_spiffe_id(agent_id)
        user_depts := input.delegation.user_departments
        count(user_depts) > 0
        agent_caps := agents.get_capabilities(agent.name)
        effective := {d | some d in user_depts; d in agent_caps}
        has_any_required_department(effective)
    }

    deny_reason := "Agent requests require user delegation context" if {
        not input.delegation
        caller := parse_spiffe_id(input.caller_spiffe_id)
        caller.type == "agent"
    }

    # Effective permissions via SPIFFE ID lookup
    effective_permissions := result if {
        input.delegation
        user := parse_spiffe_id(input.delegation.user_spiffe_id)
        agent := parse_spiffe_id(input.delegation.agent_spiffe_id)
        user_depts := users.get_departments(user.name)
        agent_caps := agents.get_capabilities(agent.name)
        result := [d | some d in user_depts; d in agent_caps]
    }

    # Effective permissions via JWT claims (delegation with user_departments)
    effective_permissions := result if {
        input.delegation
        not parse_spiffe_id(input.delegation.user_spiffe_id)
        agent := parse_spiffe_id(input.delegation.agent_spiffe_id)
        user_depts := input.delegation.user_departments
        agent_caps := agents.get_capabilities(agent.name)
        result := [d | some d in user_depts; d in agent_caps]
    }

    decision := {"allow": allow, "reason": reason, "details": details}

    reason := "Public document accessible to all" if {
        allow
        is_public_document
    }

    reason := "User has required department access" if {
        allow
        not input.delegation
        not is_public_document
    }

    reason := "Both user and agent have required access (delegation)" if {
        allow
        input.delegation
        not is_public_document
    }

    reason := deny_reason if {
        not allow
        deny_reason
    }

    reason := "Insufficient permissions" if {
        not allow
        not deny_reason
    }

    details := {
        "document_id": input.document_id,
        "required_departments": get_required_departments,
        "caller": input.caller_spiffe_id
    } if {
        not input.delegation
    }

    details := {
        "document_id": input.document_id,
        "required_departments": get_required_departments,
        "delegation": input.delegation,
        "effective_permissions": effective_permissions
    } if {
        input.delegation
    }

  document_management.rego: |
    package demo.authorization.management

    import rego.v1

    import data.demo.users

    parse_spiffe_id(spiffe_id) := result if {
        parts := split(spiffe_id, "/")
        count(parts) >= 2
        result := {
            "type": parts[count(parts) - 2],
            "name": parts[count(parts) - 1]
        }
    }

    default allow_manage := false

    allow_manage if {
        caller := parse_spiffe_id(input.caller_spiffe_id)
        caller.type == "user"
        user_depts := users.get_departments(caller.name)
        "admin" in user_depts
    }

    reason := "User has admin department access" if {
        allow_manage
    }

    reason := "Management operations require admin department" if {
        not allow_manage
    }

    decision := {
        "allow": allow_manage,
        "reason": reason
    }

  credential_gateway.rego: |
    package demo.credential_gateway

    import rego.v1

    import data.demo.agents
    import data.demo.users

    default allow := false

    permission_intersection := result if {
        user_depts := users.get_departments(input.user)
        agent_caps := agents.get_capabilities(input.agent)
        result := [d | some d in user_depts; d in agent_caps]
    }

    allow if {
        count(permission_intersection) > 0
    }

    decision := {
        "allow": allow,
        "allowed_departments": allowed_departments,
        "reason": reason,
    }

    allowed_departments := permission_intersection if {
        allow
    }

    allowed_departments := [] if {
        not allow
    }

    reason := sprintf("Intersection of %s's departments and %s's capabilities: %v", [input.user, input.agent, permission_intersection]) if {
        allow
    }

    reason := sprintf("No overlapping permissions between %s and %s", [input.user, input.agent]) if {
        not allow
        count(users.get_departments(input.user)) > 0
        count(agents.get_capabilities(input.agent)) > 0
    }

    reason := sprintf("Unknown user: %s", [input.user]) if {
        not allow
        count(users.get_departments(input.user)) == 0
    }

    reason := sprintf("Unknown agent: %s", [input.agent]) if {
        not allow
        count(users.get_departments(input.user)) > 0
        count(agents.get_capabilities(input.agent)) == 0
    }

  s3_documents.json: |
    {
      "demo": {
        "s3_documents": [
          {"id": "DOC-001", "key": "engineering/roadmap.md", "departments": ["engineering"]},
          {"id": "DOC-002", "key": "finance/q4-report.md", "departments": ["finance"]},
          {"id": "DOC-003", "key": "admin/policies.md", "departments": ["admin"]},
          {"id": "DOC-004", "key": "hr/guidelines.md", "departments": ["hr"]},
          {"id": "DOC-005", "key": "engineering/budget.md", "departments": ["finance", "engineering"]},
          {"id": "DOC-006", "key": "admin/compliance-audit.md", "departments": ["admin", "finance"]},
          {"id": "DOC-007", "key": "public/all-hands.md", "departments": []}
        ]
      }
    }
---
# OPA Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa-service
  namespace: ctf-demo
  labels:
    app: opa-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa-service
  template:
    metadata:
      labels:
        app: opa-service
    spec:
      containers:
        - name: opa-service
          image: ctf/opa-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          args:
            - serve
            - --policy-dir=/policies
          env:
            - name: SPIFFE_DEMO_SERVICE_PORT
              value: "8080"
            - name: SPIFFE_DEMO_LOG_FORMAT
              value: "json"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: policies
              mountPath: /policies
      volumes:
        - name: policies
          configMap:
            name: opa-policies
---
apiVersion: v1
kind: Service
metadata:
  name: opa-service
  namespace: ctf-demo
spec:
  selector:
    app: opa-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Document Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: ctf-demo
  labels:
    app: document-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      initContainers:
        - name: seed-documents
          image: ctf/document-service:latest
          imagePullPolicy: IfNotPresent
          args:
            - seed
            - --if-empty
          env:
            - name: SPIFFE_DEMO_STORAGE_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: document-service
          image: ctf/document-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          args:
            - serve
          env:
            - name: SPIFFE_DEMO_SERVICE_PORT
              value: "8080"
            - name: SPIFFE_DEMO_LOG_FORMAT
              value: "json"
            - name: SPIFFE_DEMO_OPA_HOST
              value: "opa-service"
            - name: SPIFFE_DEMO_OPA_PORT
              value: "8080"
            - name: SPIFFE_DEMO_STORAGE_ENABLED
              value: "false"
            # JWT validation — validate tokens from Keycloak
            - name: SPIFFE_DEMO_JWT_VALIDATION_ENABLED
              value: "true"
            - name: SPIFFE_DEMO_JWT_ISSUER_URL
              value: "http://keycloak.localtest.me:8080/realms/ctf"
            - name: SPIFFE_DEMO_JWT_EXPECTED_AUDIENCE
              value: "document-service"
            # Listen on plain HTTP (AuthBridge handles TLS termination)
            - name: SPIFFE_DEMO_SERVICE_LISTEN_PLAIN_HTTP
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: ctf-demo
spec:
  selector:
    app: document-service
  ports:
    # Expose on 8081 externally. The AuthBridge webhook excludes port 8080
    # from iptables interception (for Keycloak), so the document-service
    # must be reachable on a different port for token exchange to work.
    - port: 8081
      targetPort: 8080
  type: ClusterIP
