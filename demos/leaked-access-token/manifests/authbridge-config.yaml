# AuthBridge ConfigMaps and Secrets for the ctf-claude namespace
#
# These are required by the kagenti-webhook when injecting AuthBridge
# sidecars into the Claude agent pod.
---
# environments — Used by kagenti-client-registration container
apiVersion: v1
kind: ConfigMap
metadata:
  name: environments
  namespace: ctf-claude
data:
  SPIRE_ENABLED: "true"
  KEYCLOAK_URL: "http://keycloak-service.keycloak.svc:8080"
  KEYCLOAK_REALM: "ctf"
---
# keycloak-admin-secret — Admin credentials for client registration
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  namespace: ctf-claude
type: Opaque
stringData:
  KEYCLOAK_ADMIN_USERNAME: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
---
# authbridge-config — Used by envoy-proxy (ext-proc) for token exchange
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: ctf-claude
data:
  TOKEN_URL: "http://keycloak-service.keycloak.svc:8080/realms/ctf/protocol/openid-connect/token"
  # ISSUER must match the "iss" claim in Keycloak-issued tokens (the frontend URL)
  ISSUER: "http://keycloak.localtest.me:8080/realms/ctf"
  # Audience for inbound JWT validation (matches Claude's SPIFFE ID)
  EXPECTED_AUDIENCE: "spiffe://localtest.me/ns/ctf-claude/sa/claude-agent"
  # Used by client-registration sidecar (webhook reads from authbridge-config)
  KEYCLOAK_URL: "http://keycloak-service.keycloak.svc:8080"
  KEYCLOAK_REALM: "ctf"
---
# authproxy-routes — Outbound token exchange routes
#
# Strategy: passthrough-first, catch-all exchange.
#
# An AI agent with kubectl access can resolve ClusterIPs and bypass
# FQDN-based routes. Instead of allowlisting specific hostnames,
# we denylist known-safe destinations and exchange everything else.
#
# Traffic that never reaches the ext-proc (safe by design):
#   - HTTPS (port 443): TLS passthrough in Envoy, no ext-proc
#   - Port 8080: excluded from iptables by proxy-init (Keycloak)
#
# Traffic that reaches the ext-proc and needs explicit passthrough:
#   - Metadata service (169.254.169.254): cloud provider, no auth
#   - Kubernetes API: uses ServiceAccount token, not user JWT
#
# Everything else gets token-exchanged regardless of whether the
# agent uses an FQDN, short name, or raw ClusterIP.
apiVersion: v1
kind: ConfigMap
metadata:
  name: authproxy-routes
  namespace: ctf-claude
data:
  routes.yaml: |
    # --- Passthrough exclusions (first-match-wins) ---

    # Cloud metadata service
    - host: "169.254.169.254"
      passthrough: true

    # Kubernetes API server (uses SA token, not user JWT)
    - host: "kubernetes*"
      passthrough: true
    - host: "10.96.0.1"
      passthrough: true

    # --- Catch-all: exchange everything else ---
    # Any outbound HTTP that isn't explicitly excluded gets its
    # Authorization header exchanged via RFC 8693. This catches
    # FQDN, short service names, and raw ClusterIP access alike.
    - host: "**"
      target_audience: "document-service"
      token_scopes: "openid document-service-aud"
---
# spiffe-helper-config — SPIRE identity configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: spiffe-helper-config
  namespace: ctf-claude
data:
  helper.conf: |
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    cmd = ""
    cmd_args = ""
    cert_dir = "/opt"
    renew_signal = ""
    svid_file_name = "svid.pem"
    svid_key_file_name = "svid_key.pem"
    svid_bundle_file_name = "svid_bundle.pem"
    jwt_svids = [{jwt_audience="kagenti", jwt_svid_file_name="jwt_svid.token"}]
---
# envoy-config — Full Envoy proxy configuration
#
# Outbound listener (15123): intercepts outbound traffic, runs ext_proc
#   for token exchange. TLS traffic passes through untouched.
# Inbound listener (15124): intercepts inbound traffic, runs ext_proc
#   for JWT validation. Lua filter injects direction header.
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: ctf-claude
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          protocol: TCP
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
      - name: outbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15123
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
        filter_chains:
        # TLS passthrough (HTTPS traffic goes through as-is)
        - filter_chain_match:
            transport_protocol: tls
          filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_tls_passthrough
              cluster: original_destination
        # Plaintext HTTP: inspect and process via ext_proc
        - filter_chain_match:
            transport_protocol: raw_buffer
          filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: outbound_http
              codec_type: AUTO
              route_config:
                name: outbound_routes
                virtual_hosts:
                - name: catch_all
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
              http_filters:
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 30s
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SKIP
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      - name: inbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15124
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: inbound_http
              codec_type: AUTO
              route_config:
                name: inbound_routes
                virtual_hosts:
                - name: local_app
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
              http_filters:
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      request_handle:headers():add("x-authbridge-direction", "inbound")
                    end
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 30s
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SKIP
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: original_destination
        connect_timeout: 30s
        type: ORIGINAL_DST
        lb_policy: CLUSTER_PROVIDED
        original_dst_lb_config:
          use_http_header: false

      - name: ext_proc_cluster
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: ext_proc_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9090
